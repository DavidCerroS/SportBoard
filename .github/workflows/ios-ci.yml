name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Prepare CI constants
        env:
          FORCE: "1"
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REDIRECT_URI: ${{ secrets.STRAVA_REDIRECT_URI }}
        run: ./scripts/generate_constants.sh

      - name: Build and test
        run: |
          set -euo pipefail
          PROJECT=$(find . -maxdepth 1 -name '*.xcodeproj' | head -n1)
          SCHEME=$(xcodebuild -project "$PROJECT" -list -json | ruby -rjson -e 'j=JSON.parse(STDIN.read); puts j["project"]["schemes"].first')
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO
