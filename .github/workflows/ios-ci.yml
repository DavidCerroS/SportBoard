name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app/Contents/Developer

      - name: Create CI Constants (if missing)
        run: |
          if [ ! -f SportBoardApp/Utilities/Constants.swift ]; then
            echo "Creating dummy Constants.swift for CI"
            mkdir -p SportBoardApp/Utilities
            cat > SportBoardApp/Utilities/Constants.swift <<'EOF'
            enum Constants {
                static let stravaClientId = ""
                static let stravaClientSecret = ""
                static let redirectURI = ""
                static let apiBaseURL = "https://example.com"
            }
            EOF
          else
            echo "Constants.swift already exists, skipping creation"
          fi

      - name: Build and test
        run: |
          xcodebuild test \
            -project SportBoardApp.xcodeproj \
            -scheme SportBoardApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
