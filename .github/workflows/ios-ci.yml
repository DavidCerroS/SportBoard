name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Prepare CI constants
        run: |
          if [ ! -f SportBoardApp/Utilities/Constants.swift ] && [ -f SportBoardApp/Utilities/Constants.example.swift ]; then
            cp SportBoardApp/Utilities/Constants.example.swift SportBoardApp/Utilities/Constants.swift
          fi

      - name: Build and test
        run: |
          set -euo pipefail
          PROJECT=$(find . -maxdepth 1 -name '*.xcodeproj' | head -n1)
          SCHEME=$(xcodebuild -project "$PROJECT" -list -json | ruby -rjson -e 'j=JSON.parse(STDIN.read); puts j["project"]["schemes"].first')
          DESTINATION=$(xcodebuild -showdestinations -project "$PROJECT" -scheme "$SCHEME" 2>/dev/null | \
            awk -F'[:,}]' '/platform:iOS Simulator/ {
              name=""; os="";
              for(i=1;i<=NF;i++){
                gsub(/^ +| +$/,"",$i);
                if($i=="OS") os=$(i+1);
                if($i=="name") name=$(i+1);
              }
              gsub(/^ +| +$/, "", os);
              gsub(/^ +| +$/, "", name);
              if(name!="" && os!="") { print "platform=iOS Simulator,name=" name ",OS=" os; exit }
            }')

          test -n "$DESTINATION"

          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO
